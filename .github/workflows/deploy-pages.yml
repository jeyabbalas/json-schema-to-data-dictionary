name: Deploy demo to GitHub Pages

# Builds the (gitignored) browser bundle + the fixture-derived presets in CI and
# publishes the demo/ site. One-time setup: repo Settings → Pages → Build and
# deployment → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build library bundle
        run: npm run build

      - name: Generate demo presets from fixtures
        run: npm run demo:presets

      - name: Assemble publish directory
        run: |
          mkdir -p _site
          cp demo/index.html demo/styles.css demo/app.js demo/presets.js _site/
          cp dist/json-schema-data-dictionary.global.js _site/
          cp dist/json-schema-data-dictionary.global.js.map _site/ 2>/dev/null || true
          cp node_modules/exceljs/dist/exceljs.min.js _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
